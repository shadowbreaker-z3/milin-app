<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 ปฏิทิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif;
            background: #0f0c29;
            min-height: 100vh;
            color: #fff;
            padding: 16px;
        }
        .wrap { max-width: 1100px; margin: 0 auto; }
        .hub-link {
            display: inline-block; margin-bottom: 12px;
            color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.9em;
        }
        .hub-link:hover { color: #fff; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
        }
        .header h1 { font-size: 1.6em; font-weight: 700; }
        .header p { font-size: 0.9em; color: rgba(255,255,255,0.5); margin-top: 2px; }

        .layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 16px;
            align-items: start;
        }
        @media (max-width: 860px) {
            .layout { grid-template-columns: 1fr; }
        }

        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
        }

        .cal-nav {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; gap: 8px;
        }
        .cal-nav h2 { font-size: 1.15em; font-weight: 600; }
        .nav-btns { display: flex; gap: 6px; }
        .btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff; border-radius: 10px;
            padding: 8px 14px; font-family: inherit;
            font-size: 0.85em; cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: rgba(255,255,255,0.14); }
        .btn.primary {
            background: linear-gradient(90deg, #a29bfe, #6c5ce7);
            border-color: transparent; font-weight: 600;
        }
        .btn.primary:hover { opacity: 0.9; }
        .btn.danger { background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.3); color: #ff6b6b; }
        .btn.icon { padding: 8px 12px; font-size: 1em; }

        .weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 4px; margin-bottom: 6px;
        }
        .weekday {
            text-align: center; font-size: 0.78em;
            color: rgba(255,255,255,0.45); font-weight: 600;
            padding: 6px 0;
        }
        .weekday.sun { color: #ff7675; }

        .days {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .day {
            aspect-ratio: 1;
            min-height: 52px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 6px;
            cursor: pointer;
            display: flex; flex-direction: column;
            transition: all 0.15s;
            position: relative;
        }
        .day:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
        .day.other { opacity: 0.35; }
        .day.today { border-color: #a29bfe; background: rgba(162,155,254,0.12); }
        .day.selected { border-color: #6c5ce7; background: rgba(108,92,231,0.2); box-shadow: 0 0 0 2px rgba(108,92,231,0.3); }
        .day.sun .day-num { color: #ff7675; }
        .day-num { font-size: 0.9em; font-weight: 600; line-height: 1; }
        .day-dots {
            display: flex; flex-wrap: wrap; gap: 3px;
            margin-top: auto; padding-top: 4px;
        }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            flex-shrink: 0;
        }

        .side-panel { display: flex; flex-direction: column; gap: 16px; }
        .side-title {
            font-size: 0.95em; font-weight: 600;
            margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .side-title span { font-size: 0.85em; color: rgba(255,255,255,0.45); font-weight: 400; }

        .event-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
        .event-item {
            background: rgba(255,255,255,0.06);
            border-radius: 12px; padding: 12px;
            border-left: 4px solid #a29bfe;
            cursor: pointer; transition: background 0.15s;
        }
        .event-item:hover { background: rgba(255,255,255,0.1); }
        .event-item .ev-title { font-weight: 600; font-size: 0.92em; margin-bottom: 2px; }
        .event-item .ev-meta { font-size: 0.78em; color: rgba(255,255,255,0.5); }
        .event-item .ev-note {
            font-size: 0.82em; color: rgba(255,255,255,0.65);
            margin-top: 4px; line-height: 1.4;
        }
        .empty-msg {
            text-align: center; padding: 24px 12px;
            color: rgba(255,255,255,0.35); font-size: 0.9em;
        }

        .upcoming-item {
            display: flex; gap: 10px; align-items: flex-start;
            padding: 10px; border-radius: 12px;
            background: rgba(255,255,255,0.04);
            cursor: pointer; transition: background 0.15s;
        }
        .upcoming-item:hover { background: rgba(255,255,255,0.08); }
        .upcoming-date {
            background: rgba(162,155,254,0.2);
            border-radius: 10px; padding: 6px 8px;
            text-align: center; min-width: 44px; flex-shrink: 0;
        }
        .upcoming-date .ud { font-size: 1.1em; font-weight: 700; line-height: 1; }
        .upcoming-date .um { font-size: 0.65em; color: rgba(255,255,255,0.6); }
        .upcoming-info .ev-title { font-size: 0.88em; font-weight: 600; }
        .upcoming-info .ev-meta { font-size: 0.75em; color: rgba(255,255,255,0.45); margin-top: 2px; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center;
            z-index: 100; padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1a1735;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px; padding: 24px;
            width: 100%; max-width: 420px;
            max-height: 90vh; overflow-y: auto;
        }
        .modal h3 { font-size: 1.1em; margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 0.82em;
            color: rgba(255,255,255,0.55); margin-bottom: 6px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; color: #fff;
            font-family: inherit; font-size: 0.95em;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #a29bfe;
        }
        .form-group textarea { resize: vertical; min-height: 72px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .color-pick { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-opt {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer;
            transition: transform 0.15s;
        }
        .color-opt.active { border-color: #fff; transform: scale(1.15); }

        .modal-actions {
            display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap;
        }
        .modal-actions .btn { flex: 1; min-width: 100px; text-align: center; }
    </style>
</head>
<body>
    <div class="wrap">
        <a href="/" class="hub-link">← กลับ MilinHub</a>

        <div class="header">
            <div>
                <h1>📅 ปฏิทิน</h1>
                <p>จัดการตารางและบันทึกกิจกรรม</p>
            </div>
            <button class="btn primary" id="addBtn">+ เพิ่มกิจกรรม</button>
        </div>

        <div class="layout">
            <div class="panel">
                <div class="cal-nav">
                    <h2 id="monthLabel"></h2>
                    <div class="nav-btns">
                        <button class="btn icon" id="prevMonth" title="เดือนก่อน">◀</button>
                        <button class="btn" id="todayBtn">วันนี้</button>
                        <button class="btn icon" id="nextMonth" title="เดือนถัดไป">▶</button>
                    </div>
                </div>
                <div class="weekdays" id="weekdays"></div>
                <div class="days" id="days"></div>
            </div>

            <div class="side-panel">
                <div class="panel">
                    <div class="side-title">
                        <span id="selectedLabel">กิจกรรมวันนี้</span>
                        <button class="btn" id="addDayBtn" style="padding:4px 10px;font-size:0.78em">+ เพิ่ม</button>
                    </div>
                    <div class="event-list" id="dayEvents"></div>
                </div>
                <div class="panel">
                    <div class="side-title">🔔 กิจกรรมที่จะมาถึง</div>
                    <div class="event-list" id="upcomingEvents"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle">เพิ่มกิจกรรม</h3>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                <div class="form-group">
                    <label>ชื่อกิจกรรม *</label>
                    <input type="text" id="eventTitle" placeholder="เช่น เรียนคณิต, ไปสวนสนุก" required maxlength="80">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>วันที่</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label>เวลา (ไม่บังคับ)</label>
                        <input type="time" id="eventTime">
                    </div>
                </div>
                <div class="form-group">
                    <label>สีป้าย</label>
                    <div class="color-pick" id="colorPick"></div>
                </div>
                <div class="form-group">
                    <label>รายละเอียด (ไม่บังคับ)</label>
                    <textarea id="eventNotes" placeholder="บันทึกเพิ่มเติม..." maxlength="300"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" id="cancelBtn">ยกเลิก</button>
                    <button type="button" class="btn danger" id="deleteBtn" style="display:none">ลบ</button>
                    <button type="submit" class="btn primary">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'milin_calendar_events';
        const COLORS = [
            { id: 'purple', hex: '#a29bfe' },
            { id: 'blue', hex: '#74b9ff' },
            { id: 'green', hex: '#55efc4' },
            { id: 'yellow', hex: '#ffeaa7' },
            { id: 'orange', hex: '#fab1a0' },
            { id: 'pink', hex: '#fd79a8' },
            { id: 'red', hex: '#ff7675' },
        ];
        const THAI_DAYS = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
        const THAI_DAYS_FULL = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
        const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
            'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
        const THAI_MONTHS_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

        let events = [];
        let viewYear, viewMonth;
        let selectedDate = fmtDate(new Date());
        let selectedColor = COLORS[0].id;
        let editingId = null;

        const monthLabel = document.getElementById('monthLabel');
        const weekdaysEl = document.getElementById('weekdays');
        const daysEl = document.getElementById('days');
        const dayEventsEl = document.getElementById('dayEvents');
        const upcomingEl = document.getElementById('upcomingEvents');
        const selectedLabel = document.getElementById('selectedLabel');
        const modal = document.getElementById('modal');
        const eventForm = document.getElementById('eventForm');
        const deleteBtn = document.getElementById('deleteBtn');
        const modalTitle = document.getElementById('modalTitle');
        const colorPick = document.getElementById('colorPick');

        function fmtDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function parseDate(str) {
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        function loadEvents() {
            try {
                events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch { events = []; }
        }

        function saveEvents() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
        }

        function getColorHex(id) {
            return (COLORS.find(c => c.id === id) || COLORS[0]).hex;
        }

        function eventsOnDate(dateStr) {
            return events.filter(e => e.date === dateStr)
                .sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
        }

        function initView() {
            const now = new Date();
            viewYear = now.getFullYear();
            viewMonth = now.getMonth();
        }

        function renderWeekdays() {
            weekdaysEl.innerHTML = THAI_DAYS.map((d, i) =>
                `<div class="weekday${i === 0 ? ' sun' : ''}">${d}</div>`
            ).join('');
        }

        function renderCalendar() {
            monthLabel.textContent = `${THAI_MONTHS[viewMonth]} ${viewYear + 543}`;
            const first = new Date(viewYear, viewMonth, 1);
            const startDay = first.getDay();
            const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
            const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();
            const todayStr = fmtDate(new Date());
            let html = '';

            for (let i = startDay - 1; i >= 0; i--) {
                const d = daysInPrev - i;
                const prevMonth = viewMonth === 0 ? 11 : viewMonth - 1;
                const prevYear = viewMonth === 0 ? viewYear - 1 : viewYear;
                const dateStr = fmtDate(new Date(prevYear, prevMonth, d));
                html += dayCell(d, dateStr, true, todayStr);
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = fmtDate(new Date(viewYear, viewMonth, d));
                html += dayCell(d, dateStr, false, todayStr);
            }
            const total = startDay + daysInMonth;
            const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
            for (let d = 1; d <= remaining; d++) {
                const nextMonth = viewMonth === 11 ? 0 : viewMonth + 1;
                const nextYear = viewMonth === 11 ? viewYear + 1 : viewYear;
                const dateStr = fmtDate(new Date(nextYear, nextMonth, d));
                html += dayCell(d, dateStr, true, todayStr);
            }
            daysEl.innerHTML = html;
            daysEl.querySelectorAll('.day').forEach(el => {
                el.addEventListener('click', () => selectDate(el.dataset.date));
            });
        }

        function dayCell(num, dateStr, other, todayStr) {
            const evts = eventsOnDate(dateStr);
            const dow = parseDate(dateStr).getDay();
            const isToday = dateStr === todayStr;
            const isSelected = dateStr === selectedDate;
            const dots = evts.slice(0, 4).map(e =>
                `<span class="dot" style="background:${getColorHex(e.color)}"></span>`
            ).join('');
            return `<div class="day${other ? ' other' : ''}${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}${dow === 0 ? ' sun' : ''}" data-date="${dateStr}">
                <span class="day-num">${num}</span>
                <div class="day-dots">${dots}</div>
            </div>`;
        }

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
            renderDayEvents();
        }

        function formatThaiDate(dateStr, full) {
            const d = parseDate(dateStr);
            const day = d.getDate();
            const month = full ? THAI_MONTHS[d.getMonth()] : THAI_MONTHS_SHORT[d.getMonth()];
            const year = d.getFullYear() + 543;
            const dow = THAI_DAYS_FULL[d.getDay()];
            return full ? `วัน${dow}ที่ ${day} ${month} ${year}` : `${day} ${month}`;
        }

        function renderDayEvents() {
            const evts = eventsOnDate(selectedDate);
            const isToday = selectedDate === fmtDate(new Date());
            selectedLabel.innerHTML = isToday
                ? 'กิจกรรมวันนี้'
                : formatThaiDate(selectedDate, true);

            if (!evts.length) {
                dayEventsEl.innerHTML = '<div class="empty-msg">ยังไม่มีกิจกรรม<br>กด + เพิ่ม เพื่อบันทึก</div>';
                return;
            }
            dayEventsEl.innerHTML = evts.map(e => eventItemHtml(e)).join('');
            dayEventsEl.querySelectorAll('.event-item').forEach(el => {
                el.addEventListener('click', () => openModal(el.dataset.id));
            });
        }

        function eventItemHtml(e) {
            const time = e.time ? e.time + ' น.' : 'ทั้งวัน';
            const note = e.notes ? `<div class="ev-note">${esc(e.notes)}</div>` : '';
            return `<div class="event-item" data-id="${e.id}" style="border-left-color:${getColorHex(e.color)}">
                <div class="ev-title">${esc(e.title)}</div>
                <div class="ev-meta">${time}</div>${note}
            </div>`;
        }

        function renderUpcoming() {
            const today = fmtDate(new Date());
            const upcoming = events
                .filter(e => e.date >= today)
                .sort((a, b) => {
                    const da = a.date + (a.time || '');
                    const db = b.date + (b.time || '');
                    return da.localeCompare(db);
                })
                .slice(0, 8);

            if (!upcoming.length) {
                upcomingEl.innerHTML = '<div class="empty-msg">ไม่มีกิจกรรมที่จะมาถึง</div>';
                return;
            }
            upcomingEl.innerHTML = upcoming.map(e => {
                const d = parseDate(e.date);
                const time = e.time ? e.time + ' น.' : 'ทั้งวัน';
                return `<div class="upcoming-item" data-date="${e.date}" data-id="${e.id}">
                    <div class="upcoming-date">
                        <div class="ud">${d.getDate()}</div>
                        <div class="um">${THAI_MONTHS_SHORT[d.getMonth()]}</div>
                    </div>
                    <div class="upcoming-info">
                        <div class="ev-title">${esc(e.title)}</div>
                        <div class="ev-meta">${time}</div>
                    </div>
                </div>`;
            }).join('');

            upcomingEl.querySelectorAll('.upcoming-item').forEach(el => {
                el.addEventListener('click', () => {
                    selectDate(el.dataset.date);
                    openModal(el.dataset.id);
                });
            });
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function renderColorPick() {
            colorPick.innerHTML = COLORS.map(c =>
                `<button type="button" class="color-opt${c.id === selectedColor ? ' active' : ''}"
                    data-color="${c.id}" style="background:${c.hex}" title="${c.id}"></button>`
            ).join('');
            colorPick.querySelectorAll('.color-opt').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedColor = btn.dataset.color;
                    renderColorPick();
                });
            });
        }

        function openModal(id) {
            editingId = id || null;
            if (id) {
                const e = events.find(x => x.id === id);
                if (!e) return;
                modalTitle.textContent = 'แก้ไขกิจกรรม';
                document.getElementById('eventId').value = e.id;
                document.getElementById('eventTitle').value = e.title;
                document.getElementById('eventDate').value = e.date;
                document.getElementById('eventTime').value = e.time || '';
                document.getElementById('eventNotes').value = e.notes || '';
                selectedColor = e.color || COLORS[0].id;
                deleteBtn.style.display = 'block';
            } else {
                modalTitle.textContent = 'เพิ่มกิจกรรม';
                document.getElementById('eventId').value = '';
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventDate').value = selectedDate;
                document.getElementById('eventTime').value = '';
                document.getElementById('eventNotes').value = '';
                selectedColor = COLORS[0].id;
                deleteBtn.style.display = 'none';
            }
            renderColorPick();
            modal.classList.add('open');
            document.getElementById('eventTitle').focus();
        }

        function closeModal() {
            modal.classList.remove('open');
            editingId = null;
        }

        function uid() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }

        eventForm.addEventListener('submit', e => {
            e.preventDefault();
            const title = document.getElementById('eventTitle').value.trim();
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const notes = document.getElementById('eventNotes').value.trim();
            if (!title || !date) return;

            const payload = { title, date, time, notes, color: selectedColor };

            if (editingId) {
                const idx = events.findIndex(x => x.id === editingId);
                if (idx >= 0) events[idx] = { ...events[idx], ...payload };
            } else {
                events.push({ id: uid(), ...payload });
            }
            saveEvents();
            selectedDate = date;
            closeModal();
            renderCalendar();
            renderDayEvents();
            renderUpcoming();
        });

        deleteBtn.addEventListener('click', () => {
            if (!editingId || !confirm('ลบกิจกรรมนี้?')) return;
            events = events.filter(x => x.id !== editingId);
            saveEvents();
            closeModal();
            renderCalendar();
            renderDayEvents();
            renderUpcoming();
        });

        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
        document.getElementById('addBtn').addEventListener('click', () => openModal());
        document.getElementById('addDayBtn').addEventListener('click', () => openModal());
        document.getElementById('prevMonth').addEventListener('click', () => {
            viewMonth--;
            if (viewMonth < 0) { viewMonth = 11; viewYear--; }
            renderCalendar();
        });
        document.getElementById('nextMonth').addEventListener('click', () => {
            viewMonth++;
            if (viewMonth > 11) { viewMonth = 0; viewYear++; }
            renderCalendar();
        });
        document.getElementById('todayBtn').addEventListener('click', () => {
            const now = new Date();
            viewYear = now.getFullYear();
            viewMonth = now.getMonth();
            selectDate(fmtDate(now));
        });

        loadEvents();
        initView();
        renderWeekdays();
        renderCalendar();
        renderDayEvents();
        renderUpcoming();
    </script>
</body>
