<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 คุยกับมิลิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .back-btn {
            text-decoration: none;
            color: #764ba2;
            font-size: 1.4em;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(118,75,162,0.1); }

        .bot-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .bot-info h1 {
            font-size: 1.2em;
            color: #333;
        }
        .bot-info p {
            font-size: 0.85em;
            color: #888;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.55;
            font-size: 1rem;
            animation: popIn 0.3s ease;
            word-break: break-word;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .msg.bot {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .typing {
            align-self: flex-start;
            background: white;
            padding: 14px 20px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: none;
        }
        .typing.show { display: flex; gap: 5px; align-items: center; }
        .typing span {
            width: 8px; height: 8px;
            background: #764ba2;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 16px 8px;
        }
        .quick-btn {
            background: white;
            border: 2px solid #e0c3fc;
            color: #764ba2;
            padding: 8px 14px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }
        .quick-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-area {
            padding: 12px 16px 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #msgInput {
            flex: 1;
            border: 2px solid #e0c3fc;
            border-radius: 24px;
            padding: 12px 18px;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }
        #msgInput:focus { border-color: #764ba2; }

        #sendBtn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1.3em;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            flex-shrink: 0;
        }
        #sendBtn:hover:not(:disabled) { transform: scale(1.08); }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9em;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 10;
        }
        .error-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="back-btn" title="กลับหน้าแรก">←</a>
        <div class="bot-avatar">🤖</div>
        <div class="bot-info">
            <h1>มิลิน</h1>
            <p>เพื่อนหุ่นยนต์ของเธอ</p>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="msg bot">สวัสดีจ้า! ฉันชื่อมิลิน 🌟 อยากคุยเรื่องอะไร หรือให้ช่วยทำการบ้านไหม?</div>
    </div>

    <div class="typing" id="typing"><span></span><span></span><span></span></div>

    <div class="quick-replies" id="quickReplies">
        <button class="quick-btn" data-msg="เล่าเรื่องสั้นๆ ให้ฟังหน่อย">📖 เล่านิทาน</button>
        <button class="quick-btn" data-msg="ช่วยอธิบายตารางสูตรคูณให้หน่อย">✖️ ตารางคูณ</button>
        <button class="quick-btn" data-msg="เล่นเกมทายใจกับฉันหน่อย">🎯 ทายใจ</button>
        <button class="quick-btn" data-msg="วันนี้มีข้อความให้กำลังใจไหม">💪 ให้กำลังใจ</button>
    </div>

    <div class="input-area">
        <textarea id="msgInput" rows="1" placeholder="พิมพ์ข้อความ..." maxlength="500"></textarea>
        <button id="sendBtn" title="ส่ง">➤</button>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const typing = document.getElementById('typing');
        const errorToast = document.getElementById('errorToast');
        const quickBtns = document.querySelectorAll('.quick-btn');

        const messages = [];
        let isSending = false;

        function addBubble(text, role) {
            const el = document.createElement('div');
            el.className = `msg ${role}`;
            el.textContent = text;
            chatArea.appendChild(el);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.classList.add('show');
            setTimeout(() => errorToast.classList.remove('show'), 3500);
        }

        function setLoading(on) {
            isSending = on;
            sendBtn.disabled = on;
            quickBtns.forEach(b => b.disabled = on);
            typing.classList.toggle('show', on);
            if (on) chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage(text) {
            const trimmed = text.trim();
            if (!trimmed || isSending) return;

            addBubble(trimmed, 'user');
            messages.push({ role: 'user', content: trimmed });
            msgInput.value = '';
            msgInput.style.height = 'auto';
            setLoading(true);

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages }),
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error?.message || data.error || 'เกิดข้อผิดพลาด');
                }

                const reply = data.choices?.[0]?.message?.content?.trim();
                if (!reply) throw new Error('ไม่ได้รับคำตอบ');

                addBubble(reply, 'bot');
                messages.push({ role: 'assistant', content: reply });
            } catch (err) {
                messages.pop();
                showError(typeof err.message === 'string' ? err.message : 'ส่งข้อความไม่ได้ ลองใหม่นะ');
            } finally {
                setLoading(false);
                msgInput.focus();
            }
        }

        sendBtn.addEventListener('click', () => sendMessage(msgInput.value));

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(msgInput.value);
            }
        });

        msgInput.addEventListener('input', () => {
            msgInput.style.height = 'auto';
            msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
        });

        quickBtns.forEach(btn => {
            btn.addEventListener('click', () => sendMessage(btn.dataset.msg));
        });
    </script>
</body>
</html>
