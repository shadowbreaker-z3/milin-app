<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔤 พยัญชนะ ก-ฮ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .wrap { max-width: 900px; margin: 0 auto; }
        .hub-link {
            display: inline-block;
            margin-bottom: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 0.95em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .hub-link:hover { text-decoration: underline; }
        h1 {
            color: #fff;
            font-size: 2.2em;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15);
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
        }
        .detail {
            background: white;
            border-radius: 24px;
            padding: 28px;
            text-align: center;
            margin-bottom: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .detail-char {
            font-size: 5em;
            font-weight: 700;
            color: #e67e22;
            line-height: 1;
        }
        .detail-name {
            font-size: 1.6em;
            color: #555;
            margin: 8px 0;
        }
        .detail-word {
            font-size: 1.2em;
            color: #888;
        }
        .speak-btn {
            margin-top: 14px;
            background: linear-gradient(135deg, #f7971e, #e67e22);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .speak-btn:hover { transform: scale(1.05); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 10px;
        }
        .letter-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 16px;
            font-size: 2em;
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .letter-btn:hover { transform: translateY(-3px); }
        .letter-btn.active {
            outline: 4px solid #fff;
            transform: scale(1.08);
        }
        .c1{background:#e74c3c}.c2{background:#e67e22}.c3{background:#f1c40f;color:#333}
        .c4{background:#2ecc71}.c5{background:#1abc9c}.c6{background:#3498db}
        .c7{background:#9b59b6}.c8{background:#e91e63}.c9{background:#00bcd4}
        .c10{background:#ff5722}.c11{background:#795548}
        @media (max-width:480px) {
            .detail-char { font-size: 3.5em; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); }
            .letter-btn { font-size: 1.6em; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <a href="/" class="hub-link">← กลับ MilinHub</a>
        <h1>🔤 พยัญชนะ ก-ฮ</h1>
        <p class="subtitle">แตะตัวอักษรเพื่อดูชื่อและฟังเสียง</p>

        <div class="detail" id="detail">
            <div class="detail-char" id="dChar">ก</div>
            <div class="detail-name" id="dName">ก ไก่</div>
            <div class="detail-word" id="dWord">ตัวอย่าง: ไก่ 🐔</div>
            <button class="speak-btn" onclick="speakCurrent()">🔊 ฟังเสียง</button>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <script>
        const consonants = [
            { char: 'ก', name: 'ก ไก่', word: 'ไก่', emoji: '🐔' },
            { char: 'ข', name: 'ข ไข่', word: 'ไข่', emoji: '🥚' },
            { char: 'ฃ', name: 'ฃ ขวด', word: 'ขวด', emoji: '🍾' },
            { char: 'ค', name: 'ค ควาย', word: 'ควาย', emoji: '🐃' },
            { char: 'ฅ', name: 'ฅ คน', word: 'คน', emoji: '🧑' },
            { char: 'ฆ', name: 'ฆ ระเบิด', word: 'ระฆัง', emoji: '🔔' },
            { char: 'ง', name: 'ง งู', word: 'งู', emoji: '🐍' },
            { char: 'จ', name: 'จ จาน', word: 'จาน', emoji: '🍽️' },
            { char: 'ฉ', name: 'ฉ ช้าง', word: 'ช้าง', emoji: '🐘' },
            { char: 'ช', name: 'ช ช้าง', word: 'ช้าง', emoji: '🐘' },
            { char: 'ซ', name: 'ซ โซ่', word: 'โซ่', emoji: '⛓️' },
            { char: 'ฌ', name: 'ฌ เฌอ', word: 'เฌอ', emoji: '🌳' },
            { char: 'ญ', name: 'ญ หญิง', word: 'หญิง', emoji: '👧' },
            { char: 'ด', name: 'ด เด็ก', word: 'เด็ก', emoji: '🧒' },
            { char: 'ต', name: 'ต เต่า', word: 'เต่า', emoji: '🐢' },
            { char: 'ถ', name: 'ถ ถุง', word: 'ถุง', emoji: '👜' },
            { char: 'ท', name: 'ท ทหาร', word: 'ทหาร', emoji: '💂' },
            { char: 'ธ', name: 'ธ ธง', word: 'ธง', emoji: '🚩' },
            { char: 'น', name: 'น หนู', word: 'หนู', emoji: '🐭' },
            { char: 'บ', name: 'บ ใบไม้', word: 'ใบไม้', emoji: '🍃' },
            { char: 'ป', name: 'ป ปลา', word: 'ปลา', emoji: '🐟' },
            { char: 'ผ', name: 'ผ ผึ้ง', word: 'ผึ้ง', emoji: '🐝' },
            { char: 'ฝ', name: 'ฝ ฝา', word: 'ฝา', emoji: '🫙' },
            { char: 'พ', name: 'พ พาน', word: 'พาน', emoji: '🪔' },
            { char: 'ฟ', name: 'ฟ ฟัน', word: 'ฟัน', emoji: '🦷' },
            { char: 'ภ', name: 'ภ สำมะเล', word: 'ส้ม', emoji: '🍊' },
            { char: 'ม', name: 'ม ม้า', word: 'ม้า', emoji: '🐴' },
            { char: 'ย', name: 'ย ยักษ์', word: 'ยักษ์', emoji: '👹' },
            { char: 'ร', name: 'ร เรือ', word: 'เรือ', emoji: '⛵' },
            { char: 'ล', name: 'ล ลิง', word: 'ลิง', emoji: '🐒' },
            { char: 'ว', name: 'ว แหวน', word: 'แหวน', emoji: '💍' },
            { char: 'ศ', name: 'ศ ฤาษี', word: 'จาน', emoji: '🍽️' },
            { char: 'ษ', name: 'ษ ฤๅษี', word: 'ฤษี', emoji: '🧘' },
            { char: 'ส', name: 'ส เสือ', word: 'เสือ', emoji: '🐯' },
            { char: 'ห', name: 'ห หีบ', word: 'หีบ', emoji: '📦' },
            { char: 'ฬ', name: 'ฬ จุฬา', word: 'จุฬา', emoji: '🪁' },
            { char: 'อ', name: 'อ อ่าง', word: 'อ่าง', emoji: '🛁' },
            { char: 'ฮ', name: 'ฮ นกฮูก', word: 'ฮูก', emoji: '🦉' },
        ];

        let current = 0;
        const grid = document.getElementById('grid');

        consonants.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = 'letter-btn c' + ((i % 11) + 1);
            btn.textContent = c.char;
            btn.onclick = () => selectLetter(i);
            grid.appendChild(btn);
        });

        function selectLetter(i) {
            current = i;
            const c = consonants[i];
            document.getElementById('dChar').textContent = c.char;
            document.getElementById('dName').textContent = c.name;
            document.getElementById('dWord').textContent = 'ตัวอย่าง: ' + c.word + ' ' + c.emoji;
            document.querySelectorAll('.letter-btn').forEach((b, j) => b.classList.toggle('active', j === i));
            speak(c.name + ' ' + c.word);
        }

        function speak(text) {
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'th-TH';
            u.rate = 0.85;
            speechSynthesis.speak(u);
        }

        function speakCurrent() {
            const c = consonants[current];
            speak(c.name + ' ' + c.word);
        }

        selectLetter(0);
    </script>
</body>
</html>
