<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍅 Pomodoro Timer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #0f0c29;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .hub-link {
            align-self: flex-start;
            color: rgba(255,255,255,0.65); text-decoration: none;
            font-size: 0.9em; margin-bottom: 16px;
        }
        .hub-link:hover { color: #fff; }

        .wrap { width: 100%; max-width: 420px; text-align: center; }

        h1 { font-size: 1.5em; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 0.88em; color: rgba(255,255,255,0.45); margin-bottom: 24px; }

        .modes {
            display: flex; gap: 8px; justify-content: center;
            margin-bottom: 28px; flex-wrap: wrap;
        }
        .mode-btn {
            padding: 8px 16px; border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.65);
            font-family: inherit; font-size: 0.85em;
            cursor: pointer; transition: all 0.2s;
        }
        .mode-btn.active {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 20%, transparent);
            color: #fff; font-weight: 600;
        }

        .timer-ring {
            position: relative; width: 260px; height: 260px;
            margin: 0 auto 28px;
        }
        .timer-ring svg { transform: rotate(-90deg); }
        .timer-ring circle { fill: none; stroke-width: 8; }
        .ring-bg { stroke: rgba(255,255,255,0.08); }
        .ring-progress {
            stroke: var(--accent);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s linear;
        }
        .timer-display {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .time {
            font-size: 3.8em; font-weight: 700;
            line-height: 1; letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }
        .mode-label {
            font-size: 0.9em; color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        .controls {
            display: flex; gap: 12px; justify-content: center;
            margin-bottom: 24px;
        }
        .ctrl-btn {
            padding: 14px 32px; border-radius: 14px;
            border: none; font-family: inherit;
            font-size: 1em; font-weight: 600;
            cursor: pointer; transition: all 0.15s;
        }
        .ctrl-btn.primary {
            background: var(--accent);
            color: #fff; min-width: 140px;
        }
        .ctrl-btn.primary:hover { filter: brightness(1.1); }
        .ctrl-btn.secondary {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 14px 20px;
        }
        .ctrl-btn.secondary:hover { background: rgba(255,255,255,0.12); }

        .stats {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 20px;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 14px 8px;
        }
        .stat-val { font-size: 1.6em; font-weight: 700; color: var(--accent); }
        .stat-lbl { font-size: 0.72em; color: rgba(255,255,255,0.4); margin-top: 2px; }

        .settings {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 16px;
            text-align: left;
        }
        .settings-title {
            font-size: 0.85em; font-weight: 600;
            color: rgba(255,255,255,0.5); margin-bottom: 12px;
        }
        .setting-row {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
            font-size: 0.88em;
        }
        .setting-row:last-child { margin-bottom: 0; }
        .setting-row input[type="number"] {
            width: 64px; padding: 6px 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; color: #fff;
            font-family: inherit; text-align: center;
            outline: none;
        }
        .setting-row input[type="checkbox"] {
            width: 18px; height: 18px; cursor: pointer;
        }

        .tip {
            margin-top: 16px; font-size: 0.82em;
            color: rgba(255,255,255,0.35); line-height: 1.5;
        }

        body.mode-work { --accent: #a29bfe; }
        body.mode-short { --accent: #55efc4; }
        body.mode-long { --accent: #74b9ff; }
    </style>
</head>
<body class="mode-work">
    <a href="/" class="hub-link">← กลับ MilinHub</a>

    <div class="wrap">
        <h1>🍅 Pomodoro Timer</h1>
        <p class="subtitle">โฟกัสเรียน 25 นาที → พัก → ทำซ้ำ</p>

        <div class="modes">
            <button class="mode-btn active" data-mode="work">🎯 โฟกัส</button>
            <button class="mode-btn" data-mode="short">☕ พักสั้น</button>
            <button class="mode-btn" data-mode="long">🌴 พักยาว</button>
        </div>

        <div class="timer-ring">
            <svg width="260" height="260" viewBox="0 0 260 260">
                <circle class="ring-bg" cx="130" cy="130" r="120"/>
                <circle class="ring-progress" id="ring" cx="130" cy="130" r="120"
                    stroke-dasharray="753.98" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-display">
                <div class="time" id="timeDisplay">25:00</div>
                <div class="mode-label" id="modeLabel">เวลาโฟกัส</div>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn primary" id="startBtn">▶ เริ่ม</button>
            <button class="ctrl-btn secondary" id="resetBtn">↺ รีเซ็ต</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="todayCount">0</div>
                <div class="stat-lbl">🍅 วันนี้</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="sessionCount">0</div>
                <div class="stat-lbl">รอบโฟกัส</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="totalCount">0</div>
                <div class="stat-lbl">🍅 ทั้งหมด</div>
            </div>
        </div>

        <div class="settings">
            <div class="settings-title">⚙️ ตั้งค่า (นาที)</div>
            <div class="setting-row">
                <span>🎯 โฟกัส</span>
                <input type="number" id="setWork" min="1" max="60" value="25">
            </div>
            <div class="setting-row">
                <span>☕ พักสั้น</span>
                <input type="number" id="setShort" min="1" max="30" value="5">
            </div>
            <div class="setting-row">
                <span>🌴 พักยาว</span>
                <input type="number" id="setLong" min="1" max="60" value="15">
            </div>
            <div class="setting-row">
                <span>🔔 เสียงแจ้งเตือน</span>
                <input type="checkbox" id="setSound" checked>
            </div>
        </div>

        <p class="tip">💡 เทคนิค Pomodoro: เรียน/ทำงาน 25 นาที → พัก 5 นาที → หลัง 4 รอบ พักยาว 15 นาที</p>
    </div>

    <script>
        const STORAGE_KEY = 'milin_pomodoro';
        const CIRCUMFERENCE = 2 * Math.PI * 120;

        const MODES = {
            work:  { label: 'เวลาโฟกัส', bodyClass: 'mode-work' },
            short: { label: 'พักสั้น', bodyClass: 'mode-short' },
            long:  { label: 'พักยาว', bodyClass: 'mode-long' },
        };

        let mode = 'work';
        let totalSeconds = 25 * 60;
        let remaining = totalSeconds;
        let running = false;
        let timerId = null;
        let sessionPomodoros = 0;

        const timeDisplay = document.getElementById('timeDisplay');
        const modeLabel = document.getElementById('modeLabel');
        const ring = document.getElementById('ring');
        const startBtn = document.getElementById('startBtn');

        function loadSettings() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            } catch { return {}; }
        }

        function saveSettings(data) {
            const cur = loadSettings();
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...cur, ...data }));
        }

        function getSettings() {
            const s = loadSettings();
            return {
                work: s.work ?? 25,
                short: s.short ?? 5,
                long: s.long ?? 15,
                sound: s.sound !== false,
                today: s.today ?? 0,
                todayDate: s.todayDate ?? '',
                total: s.total ?? 0,
            };
        }

        function getDuration(m) {
            const s = getSettings();
            if (m === 'work') return s.work * 60;
            if (m === 'short') return s.short * 60;
            return s.long * 60;
        }

        function fmtTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function updateRing() {
            const pct = totalSeconds > 0 ? remaining / totalSeconds : 0;
            ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
            timeDisplay.textContent = fmtTime(remaining);
        }

        function updateStats() {
            const s = getSettings();
            const today = new Date().toDateString();
            let todayCount = s.today;
            if (s.todayDate !== today) todayCount = 0;

            document.getElementById('todayCount').textContent = todayCount;
            document.getElementById('sessionCount').textContent = sessionPomodoros;
            document.getElementById('totalCount').textContent = s.total;
        }

        function setMode(m, reset) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === m);
            });
            document.body.className = MODES[m].bodyClass;
            modeLabel.textContent = MODES[m].label;
            totalSeconds = getDuration(m);
            if (reset !== false) remaining = totalSeconds;
            updateRing();
        }

        function playSound() {
            if (!getSettings().sound) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                [0, 0.3, 0.6].forEach(delay => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = delay === 0 ? 880 : 660;
                    gain.gain.value = 0.3;
                    osc.start(ctx.currentTime + delay);
                    osc.stop(ctx.currentTime + delay + 0.25);
                });
            } catch {}
        }

        function onComplete() {
            running = false;
            clearInterval(timerId);
            timerId = null;
            startBtn.textContent = '▶ เริ่ม';
            playSound();

            if (mode === 'work') {
                sessionPomodoros++;
                const s = getSettings();
                const today = new Date().toDateString();
                let todayCount = s.todayDate === today ? s.today + 1 : 1;
                saveSettings({
                    today: todayCount,
                    todayDate: today,
                    total: s.total + 1,
                });
                updateStats();
                setMode(sessionPomodoros % 4 === 0 ? 'long' : 'short');
            } else {
                setMode('work');
            }
        }

        function tick() {
            if (remaining <= 0) { onComplete(); return; }
            remaining--;
            updateRing();
        }

        function toggleTimer() {
            if (running) {
                running = false;
                clearInterval(timerId);
                timerId = null;
                startBtn.textContent = '▶ ต่อ';
            } else {
                if (remaining <= 0) remaining = totalSeconds;
                running = true;
                startBtn.textContent = '⏸ พัก';
                timerId = setInterval(tick, 1000);
            }
        }

        function resetTimer() {
            running = false;
            clearInterval(timerId);
            timerId = null;
            startBtn.textContent = '▶ เริ่ม';
            remaining = totalSeconds;
            updateRing();
        }

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                resetTimer();
                setMode(btn.dataset.mode);
            });
        });

        startBtn.addEventListener('click', toggleTimer);
        document.getElementById('resetBtn').addEventListener('click', resetTimer);

        ['setWork', 'setShort', 'setLong'].forEach(id => {
            document.getElementById(id).addEventListener('change', e => {
                const key = id.replace('set', '').toLowerCase();
                saveSettings({ [key === 'work' ? 'work' : key]: +e.target.value || 25 });
                if (!running) setMode(mode);
            });
        });

        document.getElementById('setSound').addEventListener('change', e => {
            saveSettings({ sound: e.target.checked });
        });

        const s = getSettings();
        document.getElementById('setWork').value = s.work;
        document.getElementById('setShort').value = s.short;
        document.getElementById('setLong').value = s.long;
        document.getElementById('setSound').checked = s.sound;

        ring.style.strokeDasharray = CIRCUMFERENCE;
        setMode('work');
        updateStats();
    </script>
</body>
</html>
