<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 พจนานุกรม ไทย-อังกฤษ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .wrap { max-width: 560px; margin: 0 auto; }
        .hub-link {
            display: inline-block; margin-bottom: 12px;
            color: #fff; text-decoration: none; font-size: 0.95em;
            text-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }
        .hub-link:hover { text-decoration: underline; }
        h1 {
            text-align: center; color: #fff; font-size: 1.8em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.15); margin-bottom: 4px;
        }
        .subtitle {
            text-align: center; color: rgba(255,255,255,0.9);
            margin-bottom: 20px; font-size: 0.95em;
        }

        .search-panel {
            background: white; border-radius: 20px;
            padding: 20px; margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .dir-tabs {
            display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
        }
        .dir-tab {
            flex: 1; min-width: 90px;
            padding: 10px 8px; border: 2px solid #eee;
            border-radius: 12px; background: #fafafa;
            font-family: inherit; font-size: 0.85em;
            cursor: pointer; transition: all 0.2s;
        }
        .dir-tab.active {
            border-color: #f5576c; background: #fff0f3;
            color: #f5576c; font-weight: 600;
        }
        .search-row { display: flex; gap: 8px; }
        .search-row input {
            flex: 1; padding: 14px 16px;
            border: 2px solid #eee; border-radius: 14px;
            font-family: inherit; font-size: 1.05em; outline: none;
        }
        .search-row input:focus { border-color: #f5576c; }
        .search-btn {
            padding: 14px 20px; border: none; border-radius: 14px;
            background: linear-gradient(135deg, #f5576c, #f093fb);
            color: white; font-family: inherit; font-size: 1em;
            font-weight: 600; cursor: pointer; white-space: nowrap;
        }
        .search-btn:hover { filter: brightness(1.05); }

        .result-panel {
            background: white; border-radius: 20px;
            padding: 24px; margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            display: none;
        }
        .result-panel.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dir-badge {
            display: inline-block; font-size: 0.78em;
            background: #f0f0f5; color: #888;
            padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
        }
        .word-row {
            display: flex; align-items: center; justify-content: center;
            gap: 16px; margin-bottom: 8px; flex-wrap: wrap;
        }
        .word-box { text-align: center; flex: 1; min-width: 120px; }
        .word-label { font-size: 0.75em; color: #aaa; margin-bottom: 4px; }
        .word-text { font-size: 1.8em; font-weight: 700; color: #333; word-break: break-word; }
        .word-text.en { color: #4facfe; }
        .word-text.th { color: #f5576c; }
        .arrow { font-size: 1.5em; color: #ccc; }

        .speak-row { display: flex; justify-content: center; gap: 10px; margin: 14px 0; }
        .speak-btn {
            background: #f8f9ff; border: 1px solid #e0e4ff;
            padding: 8px 16px; border-radius: 20px;
            font-family: inherit; font-size: 0.85em; cursor: pointer;
            transition: background 0.2s;
        }
        .speak-btn:hover { background: #eef0ff; }

        .alt-title {
            font-size: 0.9em; color: #888; margin: 16px 0 10px;
            border-top: 1px solid #f0f0f0; padding-top: 14px;
        }
        .alt-list { display: flex; flex-direction: column; gap: 8px; }
        .alt-item {
            background: #fafafa; border-radius: 12px;
            padding: 10px 14px; font-size: 0.95em;
            display: flex; justify-content: space-between; gap: 10px;
        }
        .alt-item span:last-child { color: #f5576c; font-weight: 600; text-align: right; }

        .history-panel {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: 16px; padding: 16px;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .history-title { color: #fff; font-size: 0.9em; margin-bottom: 10px; }
        .history-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .history-chip {
            background: rgba(255,255,255,0.9); border: none;
            padding: 8px 14px; border-radius: 20px;
            font-family: inherit; font-size: 0.85em;
            cursor: pointer; transition: transform 0.15s;
        }
        .history-chip:hover { transform: scale(1.04); }

        .loading, .error-box {
            text-align: center; padding: 40px 20px;
            background: white; border-radius: 20px;
            font-size: 1em; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .error-box { color: #e74c3c; }
        .spinner {
            width: 36px; height: 36px; border: 3px solid #f0f0f0;
            border-top-color: #f5576c; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status { display: none; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="wrap">
        <a href="/" class="hub-link">← กลับ MilinHub</a>
        <h1>📖 พจนานุกรม</h1>
        <p class="subtitle">ไทย ↔ อังกฤษ ค้นหาได้ทั้งสองทาง</p>

        <div class="search-panel">
            <div class="dir-tabs">
                <button class="dir-tab active" data-dir="auto">🔄 อัตโนมัติ</button>
                <button class="dir-tab" data-dir="th-en">🇹🇭 → 🇬🇧</button>
                <button class="dir-tab" data-dir="en-th">🇬🇧 → 🇹🇭</button>
            </div>
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="พิมพ์คำศัพท์..." autocomplete="off">
                <button class="search-btn" onclick="doSearch()">🔍 ค้นหา</button>
            </div>
        </div>

        <div id="status"></div>

        <div class="result-panel" id="result">
            <div class="dir-badge" id="dirBadge"></div>
            <div class="word-row">
                <div class="word-box">
                    <div class="word-label" id="srcLabel">คำค้น</div>
                    <div class="word-text" id="srcWord"></div>
                </div>
                <div class="arrow">→</div>
                <div class="word-box">
                    <div class="word-label" id="dstLabel">ความหมาย</div>
                    <div class="word-text" id="dstWord"></div>
                </div>
            </div>
            <div class="speak-row">
                <button class="speak-btn" id="speakSrc" onclick="speakWord('src')">🔊 ฟังคำค้น</button>
                <button class="speak-btn" id="speakDst" onclick="speakWord('dst')">🔊 ฟังคำแปล</button>
            </div>
            <div id="altSection" style="display:none">
                <div class="alt-title">ความหมายอื่นๆ</div>
                <div class="alt-list" id="altList"></div>
            </div>
        </div>

        <div class="history-panel" id="historyPanel" style="display:none">
            <div class="history-title">🕐 ค้นหาล่าสุด</div>
            <div class="history-chips" id="historyChips"></div>
        </div>
    </div>

    <script>
        let currentDir = 'auto';
        let lastResult = null;
        const HISTORY_KEY = 'milin_dict_history';

        document.querySelectorAll('.dir-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.dir-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentDir = tab.dataset.dir;
            });
        });

        function showLoading() {
            document.getElementById('status').innerHTML =
                '<div class="loading"><div class="spinner"></div>กำลังค้นหา...</div>';
            document.getElementById('status').style.display = 'block';
            document.getElementById('result').classList.remove('show');
        }

        function showError(msg) {
            document.getElementById('status').innerHTML = `<div class="error-box">❌ ${msg}</div>`;
            document.getElementById('status').style.display = 'block';
            document.getElementById('result').classList.remove('show');
        }

        function speak(text, lang) {
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang;
            u.rate = 0.85;
            speechSynthesis.speak(u);
        }

        function speakWord(which) {
            if (!lastResult) return;
            const isThEn = lastResult.langpair === 'th|en';
            if (which === 'src') {
                speak(lastResult.query, isThEn ? 'th-TH' : 'en-US');
            } else {
                speak(lastResult.translation, isThEn ? 'en-US' : 'th-TH');
            }
        }

        function saveHistory(word) {
            let hist = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            hist = [word, ...hist.filter(w => w !== word)].slice(0, 8);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
            renderHistory();
        }

        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const panel = document.getElementById('historyPanel');
            const chips = document.getElementById('historyChips');
            if (!hist.length) { panel.style.display = 'none'; return; }
            panel.style.display = 'block';
            chips.innerHTML = '';
            hist.forEach(w => {
                const btn = document.createElement('button');
                btn.className = 'history-chip';
                btn.textContent = w;
                btn.onclick = () => searchWord(w);
                chips.appendChild(btn);
            });
        }

        function render(data) {
            lastResult = data;
            const isThEn = data.langpair === 'th|en';

            document.getElementById('dirBadge').textContent = data.direction;
            document.getElementById('srcLabel').textContent = isThEn ? 'ภาษาไทย' : 'English';
            document.getElementById('dstLabel').textContent = isThEn ? 'English' : 'ภาษาไทย';
            document.getElementById('srcWord').textContent = data.query;
            document.getElementById('srcWord').className = 'word-text ' + (isThEn ? 'th' : 'en');
            document.getElementById('dstWord').textContent = data.translation;
            document.getElementById('dstWord').className = 'word-text ' + (isThEn ? 'en' : 'th');

            const altSection = document.getElementById('altSection');
            const altList = document.getElementById('altList');
            if (data.matches?.length) {
                altSection.style.display = 'block';
                altList.innerHTML = data.matches.map(m =>
                    `<div class="alt-item"><span>${m.text}</span><span>${m.translation}</span></div>`
                ).join('');
            } else {
                altSection.style.display = 'none';
            }

            document.getElementById('status').style.display = 'none';
            document.getElementById('result').classList.add('show');
            saveHistory(data.query);
        }

        async function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            showLoading();
            try {
                const params = new URLSearchParams({ q });
                if (currentDir !== 'auto') params.set('dir', currentDir);
                const res = await fetch('/api/dictionary?' + params);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'เกิดข้อผิดพลาด');
                render(data);
            } catch (err) {
                showError(err.message);
            }
        }

        function searchWord(word) {
            document.getElementById('searchInput').value = word;
            doSearch();
        }

        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });

        renderHistory();
    </script>
</body>
</html>
