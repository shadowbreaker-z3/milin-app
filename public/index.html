<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilinHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation span {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        .bg-animation span:nth-child(1) { left: 10%; width: 20px; height: 20px; animation-delay: 0s; animation-duration: 12s; }
        .bg-animation span:nth-child(2) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 18s; }
        .bg-animation span:nth-child(3) { left: 35%; width: 25px; height: 25px; animation-delay: 4s; animation-duration: 14s; }
        .bg-animation span:nth-child(4) { left: 50%; width: 12px; height: 12px; animation-delay: 1s; animation-duration: 16s; }
        .bg-animation span:nth-child(5) { left: 65%; width: 18px; height: 18px; animation-delay: 3s; animation-duration: 20s; }
        .bg-animation span:nth-child(6) { left: 80%; width: 22px; height: 22px; animation-delay: 5s; animation-duration: 13s; }
        .bg-animation span:nth-child(7) { left: 90%; width: 14px; height: 14px; animation-delay: 6s; animation-duration: 17s; }
        .bg-animation span:nth-child(8) { left: 45%; width: 16px; height: 16px; animation-delay: 7s; animation-duration: 15s; }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 4em;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            color: #fff;
            font-size: 2.8em;
            font-weight: 700;
            background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe, #00f2fe);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.3em;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* Cards grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 35px 30px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }
        .card:hover::before {
            left: 100%;
        }
        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.4s; }
        .card:nth-child(3) { animation-delay: 0.6s; }
        .card:nth-child(4) { animation-delay: 0.8s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        0 0 30px rgba(79, 172, 254, 0.2);
        }

        .card-icon {
            font-size: 3.5em;
            margin-bottom: 15px;
            display: inline-block;
            transition: transform 0.3s;
        }
        .card:hover .card-icon {
            transform: scale(1.2) rotate(5deg);
        }

        .card-title {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #fff, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-desc {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        /* Footer */
        .footer {
            margin-top: 60px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9em;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 1s;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <div class="content">
        <div class="header">
            <div class="logo">🚀</div>
            <h1>MilinHub</h1>
            <p class="subtitle">พื้นที่สําหรบการเรียนรู้</p>
        </div>

        <div class="grid">
            <a href="/apps/multiplication-game" class="card">
                <div class="card-icon">🎮</div>
                <div class="card-title">ตารางสูตรคูณ</div>
                <div class="card-desc">ฝึกคูณ 1-12 แบบนันทนาการ</div>
            </a>

            <a href="/apps/multiplication-trainer" class="card">
                <div class="card-icon">🧠</div>
                <div class="card-title">ฝึกคํานวณ</div>
                <div class="card-desc">ฝึกความเร็วในการคํานวณ</div>
            </a>

            <a href="/apps/kid-chatbot" class="card">
                <div class="card-icon">🤖</div>
                <div class="card-title">คุยกับมิลลิ</div>
                <div class="card-desc">แชทบอทเพื่อนหุ่นยนต์สำหรับเด็ก</div>
            </a>
        </div>

        <div class="footer">
            <p>Made with ❤️ for learning</p>
        </div>
    </div>
</body>
</html>
