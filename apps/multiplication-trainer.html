<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 ฝึกลบเลขคูน 🌟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Thai', 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        /* --- Settings Panel --- */
        .settings {
            background: #f8f9ff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .settings h2 {
            color: #555;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .range-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .range-group label {
            font-size: 1.1em;
            color: #555;
        }

        .range-group select {
            padding: 10px 20px;
            font-size: 1.2em;
            border: 2px solid #667eea;
            border-radius: 12px;
            background: white;
            color: #333;
            cursor: pointer;
            outline: none;
        }

        .range-group select:focus {
            border-color: #764ba2;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.4em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        /* --- Game Panel --- */
        .game {
            display: none;
        }

        .score-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 15px;
        }

        .score-item {
            font-size: 1.1em;
        }

        .score-item .label {
            color: #888;
            font-size: 0.9em;
        }

        .score-item .value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .score-correct .value { color: #27ae60; }
        .score-wrong .value { color: #e74c3c; }
        .score-streak .value { color: #f39c12; }

        .question-box {
            font-size: 4em;
            font-weight: bold;
            color: #333;
            margin: 30px 0;
            padding: 30px;
            background: linear-gradient(135deg, #f8f9ff, #eef0ff);
            border-radius: 20px;
            border: 3px solid #667eea;
        }

        .question-box span {
            color: #764ba2;
        }

        .answer-input {
            font-size: 2.5em;
            padding: 15px 25px;
            border: 3px solid #ddd;
            border-radius: 15px;
            text-align: center;
            width: 200px;
            outline: none;
            transition: border-color 0.3s;
        }

        .answer-input:focus {
            border-color: #667eea;
        }

        .answer-input.correct {
            border-color: #27ae60;
            background: #e8f8f0;
        }

        .answer-input.wrong {
            border-color: #e74c3c;
            background: #fde8e8;
        }

        .submit-btn {
            display: block;
            margin: 20px auto;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .feedback {
            font-size: 1.5em;
            margin: 20px 0;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .feedback.correct { color: #27ae60; }
        .feedback.wrong { color: #e74c3c; }

        .next-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            margin-top: 10px;
        }

        .next-btn:hover {
            transform: translateY(-2px);
        }

        .back-btn {
            background: none;
            border: 2px solid #ccc;
            color: #888;
            padding: 8px 25px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            transition: border-color 0.3s;
        }

        .back-btn:hover {
            border-color: #999;
            color: #555;
        }

        /* --- Result Panel --- */
        .result {
            display: none;
        }

        .result h2 {
            font-size: 2em;
            color: #764ba2;
            margin-bottom: 20px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 15px;
        }

        .stat-card .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #764ba2;
        }

        .stat-card .stat-label {
            color: #888;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .wrong-review {
            text-align: left;
            margin: 20px 0;
        }

        .wrong-review h3 {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .wrong-item {
            background: #fde8e8;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .wrong-item .correct-ans {
            color: #27ae60;
            font-weight: bold;
        }

        /* --- Animations --- */
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .bounce { animation: bounce 0.5s ease; }
        .shake { animation: shake 0.5s ease; }

        /* --- Confetti --- */
        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .confetti {
            position: fixed;
            top: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: confetti-fall 3s ease-in forwards;
            z-index: 999;
            pointer-events: none;
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            .container { padding: 25px; }
            h1 { font-size: 1.8em; }
            .question-box { font-size: 2.5em; padding: 20px; }
            .answer-input { font-size: 1.8em; width: 150px; }
            .result-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Settings Screen -->
        <div id="settings-screen">
            <h1>🌟 ฝึกลบเลขคูน 🌟</h1>
            <p class="subtitle">เรียนเลขคูนอย่างสนุก!</p>

            <div class="settings">
                <h2>📚 เลือกตารางเลขที่อยากฝึก</h2>
                <div class="range-group">
                    <label>จาก:</label>
                    <select id="from-select">
                        <option value="2" selected>2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                    <label>ถึง:</label>
                    <select id="to-select">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9" selected>9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="range-group">
                    <label>จำนวนข้อ:</label>
                    <select id="count-select">
                        <option value="5">5 ข้อ</option>
                        <option value="10" selected>10 ข้อ</option>
                        <option value="20">20 ข้อ</option>
                        <option value="30">30 ข้อ</option>
                    </select>
                </div>
                <button class="start-btn" onclick="startGame()">🚀 เริ่มเล่น!</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="game">
            <div class="score-bar">
                <div class="score-item score-correct">
                    <div class="label">ถูก ✅</div>
                    <div class="value" id="correct-count">0</div>
                </div>
                <div class="score-item score-wrong">
                    <div class="label">ผิด ❌</div>
                    <div class="value" id="wrong-count">0</div>
                </div>
                <div class="score-item score-streak">
                    <div class="label">ติดกัน 🔥</div>
                    <div class="value" id="streak-count">0</div>
                </div>
            </div>

            <div class="question-box" id="question-box">
                <span id="num1">3</span> × <span id="num2">7</span> = ?
            </div>

            <input type="number" class="answer-input" id="answer-input"
                   placeholder="?" autocomplete="off"
                   onkeydown="if(event.key==='Enter') checkAnswer()">

            <button class="submit-btn" onclick="checkAnswer()">✅ ตอบเลย!</button>

            <div class="feedback" id="feedback"></div>

            <button class="next-btn" id="next-btn" style="display:none;" onclick="nextQuestion()">ข้อต่อไป ➡️</button>

            <button class="back-btn" onclick="goHome()">⬅️ กลับหน้าหลัก</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="result">
            <h2 id="result-title">🎉 เสร็จแล้ว!</h2>

            <div class="result-stats">
                <div class="stat-card">
                    <div class="stat-value" id="result-total">10</div>
                    <div class="stat-label">ข้อทั้งหมด</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="result-correct">8</div>
                    <div class="stat-label">ข้อถูก ✅</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="result-percent">80%</div>
                    <div class="stat-label">คะแนน</div>
                </div>
            </div>

            <div class="wrong-review" id="wrong-review"></div>

            <button class="start-btn" onclick="startGame()">🔄 ฝึกอีกครั้ง</button>
            <br>
            <button class="back-btn" onclick="goHome()">⬅️ เปลี่ยนตารางเลข</button>
        </div>
    </div>

    <script>
        // --- State ---
        let questions = [];
        let currentQ = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let streak = 0;
        let maxStreak = 0;
        let wrongAnswers = [];
        let answered = false;

        // --- Encouragement messages ---
        const correctMessages = [
            "🎉 ถูกต้อง! ยอดเยี่ยม!",
            "🌟 เก่งมาก!",
            "👏 เก่งมากๆ เลย!",
            "🏆 ถูกต้อง! เธอเก่งมาก!",
            "✨ ถูกต้อง! ฉลาดมาก!",
            "🎊 ถูกต้อง! สุดยอด!",
            "💪 ถูกต้อง! เก่งจริงๆ!",
            "🌈 ถูกต้อง! เยี่ยมไปเลย!",
            "⭐ ถูกต้อง! ดาวประจำใจ!",
            "🎯 ถูกต้อง! ตรงเป๊ะ!"
        ];

        const wrongMessages = [
            "❌ ยังไงก็ลองใหม่อีกครั้งนะ!",
            "💪 ไม่เป็นไร ลองใหม่อีกครั้ง!",
            "🌟 ผิดนิดเดียวเอง ลองอีกครั้ง!",
            "😊 ลองคิดใหม่อีกครั้งนะ!"
        ];

        // --- Functions ---
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startGame() {
            const from = parseInt(document.getElementById('from-select').value);
            const to = parseInt(document.getElementById('to-select').value);
            const count = parseInt(document.getElementById('count-select').value);

            if (from > to) {
                alert('ค่า "จาก" ต้องน้อยกว่าหรือเท่ากับ "ถึง" นะครับ');
                return;
            }

            // Generate all possible questions
            const allQuestions = [];
            for (let i = from; i <= to; i++) {
                for (let j = 1; j <= 12; j++) {
                    allQuestions.push({ a: i, b: j, answer: i * j });
                }
            }

            // Shuffle and pick
            questions = shuffle(allQuestions).slice(0, Math.min(count, allQuestions.length));
            currentQ = 0;
            correctCount = 0;
            wrongCount = 0;
            streak = 0;
            maxStreak = 0;
            wrongAnswers = [];

            document.getElementById('settings-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';

            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const q = questions[currentQ];
            document.getElementById('num1').textContent = q.a;
            document.getElementById('num2').textContent = q.b;
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').className = 'answer-input';
            document.getElementById('answer-input').disabled = false;
            document.getElementById('answer-input').focus();
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('next-btn').style.display = 'none';
            document.querySelector('.submit-btn').style.display = 'block';
            updateScoreBar();
        }

        function checkAnswer() {
            if (answered) return;

            const input = document.getElementById('answer-input');
            const userAnswer = parseInt(input.value);

            if (isNaN(userAnswer)) {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
                return;
            }

            answered = true;
            const q = questions[currentQ];
            const isCorrect = userAnswer === q.answer;
            const feedback = document.getElementById('feedback');

            input.disabled = true;
            document.querySelector('.submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';

            if (isCorrect) {
                correctCount++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                input.classList.add('correct');
                const msg = correctMessages[Math.floor(Math.random() * correctMessages.length)];
                feedback.textContent = msg;
                feedback.className = 'feedback correct';
                input.classList.add('bounce');
                setTimeout(() => input.classList.remove('bounce'), 500);

                // Mini confetti for streaks
                if (streak >= 3 && streak % 3 === 0) {
                    spawnConfetti(15);
                }
            } else {
                wrongCount++;
                streak = 0;
                input.classList.add('wrong');
                const msg = wrongMessages[Math.floor(Math.random() * wrongMessages.length)];
                feedback.innerHTML = msg + '<br>คำตอบที่ถูกคือ <strong>' + q.answer + '</strong>';
                feedback.className = 'feedback wrong';
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);

                wrongAnswers.push({
                    question: q.a + ' × ' + q.b,
                    correct: q.answer,
                    user: userAnswer
                });
            }

            updateScoreBar();
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ >= questions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }

        function updateScoreBar() {
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('wrong-count').textContent = wrongCount;
            document.getElementById('streak-count').textContent = streak;
        }

        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            const total = questions.length;
            const percent = Math.round((correctCount / total) * 100);

            document.getElementById('result-total').textContent = total;
            document.getElementById('result-correct').textContent = correctCount;
            document.getElementById('result-percent').textContent = percent + '%';

            // Title based on score
            let title = '🎉 เสร็จแล้ว!';
            if (percent === 100) title = '🏆 คะแนนเต็ม! เธอเก่งจริงๆ!';
            else if (percent >= 80) title = '🌟 ยอดเยี่ยม! เก่งมาก!';
            else if (percent >= 60) title = '👏 ดีมาก! ฝึกอีกนะ!';
            else if (percent >= 40) title = '💪 พยายามแล้ว! ลองใหม่อีกครั้ง!';
            else title = '😊 ไม่เป็นไร ฝึกอีกนะ!';
            document.getElementById('result-title').textContent = title;

            // Wrong answer review
            const reviewDiv = document.getElementById('wrong-review');
            if (wrongAnswers.length > 0) {
                let html = '<h3>❌ ข้อที่ตอบผิด — ฝึกอีกนะ!</h3>';
                wrongAnswers.forEach(wa => {
                    html += `<div class="wrong-item">
                        ${wa.question} = ?
                        <br>เธอตอบ: <span style="color:#e74c3c">${wa.user}</span>
                        &nbsp;|&nbsp;
                        ถูกต้อง: <span class="correct-ans">${wa.correct}</span>
                    </div>`;
                });
                reviewDiv.innerHTML = html;
            } else {
                reviewDiv.innerHTML = '<p style="color:#27ae60; font-size:1.2em;">🎉 ตอบถูกทุกข้อ! ไม่ผิดเลย!</p>';
            }

            // Big confetti for great scores
            if (percent >= 80) {
                spawnConfetti(50);
            }
        }

        function goHome() {
            document.getElementById('settings-screen').style.display = 'block';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
        }

        function spawnConfetti(count) {
            const colors = ['#667eea', '#764ba2', '#f39c12', '#27ae60', '#e74c3c', '#3498db', '#e91e63'];
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                confetti.style.width = (5 + Math.random() * 10) + 'px';
                confetti.style.height = confetti.style.width;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }
    </script>
</body>
</html>
